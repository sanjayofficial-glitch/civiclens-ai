name: Deploy to Firebase

on:
  push:
    branches:
      - main 

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- ADD YOUR BUILD STEPS HERE ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Update to match project version
          
      - name: Install Dependencies and Build
        run: |
          npm ci
          # npm run build (uncomment if the project requires a build step)

      # --- AUTHENTICATE TO GOOGLE CLOUD ---
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/908858487790/locations/global/workloadIdentityPools/github-pool-v4/providers/github-provider-v4'
          service_account: 'github-actions-sa@blockseblock-81d99.iam.gserviceaccount.com'

      # --- DEPLOY TO FIREBASE ---
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: firebase deploy --project blockseblock-81d99
